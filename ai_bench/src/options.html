<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>[ maitrix ] Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <h1 id="optBrand" class="opt-brand"></h1>

  <label for="topCount">TOP models to show</label>
  <select id="topCount"></select>

  <label>My fav</label>
  <div class="fav-add">
    <select id="modelPick">
      <option value="">— load models first —</option>
    </select>
    <button id="addFav" type="button">Add</button>
  </div>
  <div id="favList" class="fav-list"></div>

  <label for="excluded">Excluded metrics (snake_case)</label>
  <textarea id="excluded" rows="4" spellcheck="false"></textarea>

  <label for="historyBarCount">History bars (5–24)</label>
  <input id="historyBarCount" type="number" min="5" max="24" value="7" />

  <p id="status" class="status"></p>
  <button id="save" type="button">Save</button>
  <button id="refresh" type="button">Save &amp; refresh</button>
  <script type="module" src="options.js"></script>
</body>
</html>
